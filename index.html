<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur de Bandelettes A4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="toolbar no-print">
        <div class="toolbar-group">
            <label>Mise en page :</label>
            <button id="btn-full" class="active">Pleine Page</button>
            <button id="btn-thirds">Tiers (Horizontal)</button>
            <button id="btn-halves">Moitiés (Vertical)</button>
            <button id="btn-eight">8 Rectangles</button>
            <button id="btn-sixteen">16 Rectangles</button>
        </div>

        <div class="toolbar-group">
            <label for="size-selector">Taille :</label>
            <select id="size-selector">
                <option value="auto" selected>Auto</option>
                <option value="10">10</option>
                <option value="12">12</option>
                <option value="14">14</option>
                <option value="16">16</option>
                <option value="18">18</option>
                <option value="20">20</option>
                <option value="24">24</option>
                <option value="28">28</option>
                <option value="32">32</option>
                <option value="36">36</option>
                <option value="42">42</option>
                <option value="48">48</option>
                <option value="60">60</option>
                <option value="72">72</option>
                <option value="96">96</option>
                <option value="120">120</option>
                <option value="144">144</option>
                <option value="160">160</option>
                <option value="180">180</option>
                <option value="200">200</option>
            </select>
        </div>

        <div class="toolbar-group">
            <label for="font-selector">Police :</label>
            <select id="font-selector">
                <option value="'Caveat Brush', cursive" selected>Caveat Brush</option>
                <option value="'Sarabun', sans-serif">Sarabun</option>
                <option value="'Raleway', sans-serif">Raleway</option>
                <option value="Arial, sans-serif">Arial</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="Verdana, sans-serif">Verdana</option>
                <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
            </select>
        </div>

        <div class="toolbar-group">
            <button id="btn-harmonize">Harmoniser police</button>
            <button id="btn-print" class="btn-primary">Imprimer</button>
            <button id="btn-pdf">Enregistrer en PDF</button>
            <button id="btn-import">Importer Liste</button>
            <button id="btn-reset">Remise à zéro</button>
        </div>
    </header>

    <main id="page-container">
        <div id="a4-page" class="layout-full">
            <div class="editable-area" contenteditable="true">
                Cliquez ici pour éditer le texte...
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
